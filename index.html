<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial;
    text-align:center;
    padding:20px;
    background:#f5f5f5;
}

#reader{
    width:100%;
    max-width:350px;
    margin:auto;
}

video{
    width:100%;
    max-width:350px;
    border-radius:10px;
}

canvas{
    display:none;
}

button{
    padding:12px;
    margin-top:10px;
    width:100%;
    max-width:350px;
    border:none;
    background:#1976d2;
    color:white;
    border-radius:8px;
    font-size:16px;
}

img{
    width:100%;
    max-width:350px;
    margin-top:10px;
    border-radius:10px;
}

</style>

</head>

<body>

<h2 id="title"></h2>

<!-- QR -->
<div id="reader"></div>

<!-- PHOTO -->
<video id="camera"
       autoplay
       playsinline
       style="display:none;">
</video>

<canvas id="canvas"></canvas>

<button
    id="captureBtn"
    style="display:none;">

    Capture Receipt

</button>

<img id="preview"
     style="display:none;">

<script>

const params =
new URLSearchParams(window.location.search);

const mode =
params.get("mode");

const title =
document.getElementById("title");

/* =====================================
   QR MODE
===================================== */

if(mode === "qr"){

    title.innerText =
    "Scan QR Code";

    startQrScanner();
}

/* =====================================
   PHOTO MODE
===================================== */

if(mode === "photo"){

    title.innerText =
    "Capture Receipt";

    startCamera();
}

/* =====================================
   QR SCANNER
===================================== */

function startQrScanner(){

    const html5QrCode =
    new Html5Qrcode("reader");

    Html5Qrcode.getCameras()

    .then(cameras => {

        if(cameras.length){

            html5QrCode.start(

                {
                    facingMode:"environment"
                },

                {
                    fps:10,
                    qrbox:250
                },

                function(decodedText){

                    if(window.opener){

                        window.opener.postMessage({

                            type:"QR_RESULT",
                            value:decodedText

                        }, "*");
                    }

                    html5QrCode.stop();

                    window.close();
                }
            );
        }

    })

    .catch(err => {

        alert(err);

    });
}

/* =====================================
   CAMERA
===================================== */

async function startCamera(){

    const video =
    document.getElementById("camera");

    const btn =
    document.getElementById("captureBtn");

    video.style.display =
    "block";

    btn.style.display =
    "block";

    try{

        const stream =
        await navigator.mediaDevices.getUserMedia({

            video:{
                facingMode:{
                    ideal:"environment"
                }
            },

            audio:false
        });

        video.srcObject =
        stream;

    }

    catch(err){

        alert(
            "Camera Permission Denied"
        );

        console.log(err);
    }
}

/* =====================================
   CAPTURE PHOTO
===================================== */

document
.getElementById("captureBtn")
.addEventListener("click", function(){

    const video =
    document.getElementById("camera");

    const canvas =
    document.getElementById("canvas");

    const ctx =
    canvas.getContext("2d");

    canvas.width =
    video.videoWidth;

    canvas.height =
    video.videoHeight;

    ctx.drawImage(
        video,
        0,
        0,
        canvas.width,
        canvas.height
    );

    const base64 =
    canvas.toDataURL(
        "image/jpeg",
        0.7
    );

    if(window.opener){

        window.opener.postMessage({

            type:"PHOTO_RESULT",
            value:base64

        }, "*");
    }

    window.close();

});

</script>

</body>
</html>
