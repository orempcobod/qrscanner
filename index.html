<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial;
    text-align:center;
    padding:20px;
}

#reader{
    width:350px;
    margin:auto;
}

</style>

</head>

<body>

<h2>Scan Fuel Slip QR</h2>

<div id="camera"></div>
<div id="reader"></div>

<script>

const GAS_URL =
"https://script.google.com/macros/s/AKfycbzGDLBruso5mFKWuJAXyl08YhK5NOjHuM97lHfM1v_OrYx8asFpMwKRyWhNs_GR0KjJLA/exec";

function onScanSuccess(decodedText){

    window.location.href =
    GAS_URL +
    "?qr=" +
    encodeURIComponent(decodedText);

}

const html5QrCode = new Html5Qrcode("reader");

Html5Qrcode.getCameras()
.then(cameras => {

    document.getElementById("camera").innerHTML =
        "Cameras found: " + cameras.length;

    if (cameras.length) {

        html5QrCode.start(

            { facingMode: "environment" },   // ✅ BACK CAMERA FIX

            {
                fps: 10,
                qrbox: 250
            },

            onScanSuccess

        );

    }

})
.catch(err => {
    console.log(err);
});

</script>

</body>
</html>
