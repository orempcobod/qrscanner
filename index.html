<!DOCTYPE html>
<html>

<head>

<meta name="viewport"
      content="width=device-width, initial-scale=1.0">

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
    font-family:Arial;
    text-align:center;
    padding:20px;
}

#reader{
    width:320px;
    margin:auto;
}

</style>

</head>

<body>

<h2>Scan Fuel Slip QR</h2>

<div id="reader"></div>

<script>

function onScanSuccess(decodedText){

    /*
    SEND RESULT TO MAIN WINDOW
    */

    if(window.opener){

        window.opener.postMessage({

            type:"QR_RESULT",
            value:decodedText

        }, "*");

    }

    /*
    CLOSE SCANNER
    */

    window.close();

}

const html5QrCode =
new Html5Qrcode("reader");

Html5Qrcode
.getCameras()
.then(cameras => {

    if(cameras.length){

        html5QrCode.start(

            cameras[0].id,

            {
                fps:10,
                qrbox:250
            },

            onScanSuccess

        );

    }

})
.catch(err => {

    alert(err);

});

</script>

</body>
</html>
